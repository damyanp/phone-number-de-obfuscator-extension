<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>📞 Phone Decoder</h1>
    <p class="subtitle">Community Bulletin Board</p>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Decoding enabled</span>
    </div>

    <div class="stats" id="stats">
      <span id="count">0</span> numbers decoded on this page
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
